<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Real-Time Transcription</title>
    <style>
      :root { font-family: Inter, system-ui, -apple-system, sans-serif; color-scheme: dark; }
      body { margin: 0; background: #0b1020; color: #e8ecff; }
      .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
      .card { background: #131c38; border: 1px solid #2e3d73; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
      h1 { margin-top: 0; }
      .controls { display: flex; flex-wrap: wrap; gap: .75rem; }
      button { border: 0; border-radius: 12px; padding: .8rem 1rem; font-weight: 600; cursor: pointer; }
      .primary { background: #5f79ff; color: white; }
      .secondary { background: #29408b; color: white; }
      .danger { background: #8f3142; color: white; }
      .status { margin-top: .75rem; color: #a9b8ff; }
      #transcript { min-height: 260px; white-space: pre-wrap; line-height: 1.5; }
      .partial { opacity: .75; font-style: italic; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Azure Real-Time Transcription</h1>
      <div class="card">
        <div class="controls">
          <button id="startButton" class="primary">Start transcription</button>
          <button id="armKeyword" class="secondary">Arm Azure keyword</button>
          <button id="stopButton" class="danger" disabled>Stop</button>
        </div>
        <div id="status" class="status">Checking Azure STT status…</div>
      </div>
      <div class="card">
        <h3>Transcript</h3>
        <div id="transcript"></div>
      </div>
    </div>
    <script src="/azure-stt.js"></script>
  </body>
</html>
